name: Facebook to WordPress Automator

on:
  schedule:
    # Orele sunt calculate pentru UTC (Ora României minus 2 ore)
    # 05:00 UTC = 07:00 RO
    # 11:00 UTC = 13:00 RO
    # 20:00 UTC = 22:00 RO
    - cron: '0 5,11,20 * * *'
  workflow_dispatch: # Permite rularea manuală

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Preia sursele din Git
        uses: actions/checkout@v4

      - name: Seteaza Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instaleaza dependintele NPM
        run: npm install axios form-data playwright

      - name: Instaleaza Chromium (Playwright)
        run: npx playwright install chromium

      - name: Ruleaza scraper-ul automatizat (Salvare Locala V5.0)
        env:
          FB_PAGE_URL: ${{ secrets.FB_PAGE_URL }}
        run: node scraper.js

      - name: Verifica daca fisierele au fost create
        run: ls -la

      - name: Commit si Push datele salvate
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json post_*.jpg
          
          if git diff --staged --quiet; then
            echo "Fara modificari de salvat"
          else
            git commit -m "Automatizare: Actualizat date Facebook"
            git push
          fi
