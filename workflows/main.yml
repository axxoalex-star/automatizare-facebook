name: Facebook to WordPress Automator

on:
  schedule:
    - cron: '0 9 * * *' # Rulează zilnic la ora 09:00 UTC
  workflow_dispatch: # Permite rularea manuală

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Preia sursele din Git
        uses: actions/checkout@v4 # Actualizat la v4

      - name: Seteaza Node.js 22 # Folosim o versiune mai noua
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instaleaza dependintele NPM
        run: npm install

      - name: Instaleaza Chromium (Playwright)
        run: npx playwright install chromium

      - name: Ruleaza scraper-ul automatizat
        env:
          FB_PAGE_URL: ${{ secrets.FB_PAGE_URL }}
          WP_ENDPOINT: ${{ secrets.WP_ENDPOINT }}
          API_KEY: ${{ secrets.API_KEY }}
        run: node scraper.js
